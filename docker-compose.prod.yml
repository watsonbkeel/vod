services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - path: .env.production
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vod}:${POSTGRES_PASSWORD:-vod}@postgres:5432/${POSTGRES_DB:-vod}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:3000:3000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vod}
      POSTGRES_USER: ${POSTGRES_USER:-vod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vod}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
